<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DueNow</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>DueNow</h1>
  </header>

  <main>
    <section id="add-assignment">
      <h2>Add Assignment</h2>
      <input type="text" id="class-name" placeholder="Class Name">
      <input type="text" id="assignment-name" placeholder="Assignment Name">
      <input type="date" id="due-date">
      <button id="add-btn">Add</button>
    </section>

    <section id="due-today">
      <h2>Due Today</h2>
      <ul id="today-list"></ul>
    </section>

    <section id="due-tomorrow">
      <h2>Due Tomorrow</h2>
      <ul id="tomorrow-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
